<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="545"
     viewBox="0 0 1100 545"
     font-family="Arial,Helvetica,sans-serif">
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#333"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E65100"/>
    </marker>
    <marker id="arr-c" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════════════
       POWER SUPPLY
  ════════════════════════════════════════════════════════ -->
  <rect x="14" y="12" width="530" height="88" rx="5"
        fill="#FFF8E1" stroke="#FFA000" stroke-width="1.5"/>
  <text x="24" y="28" font-size="10" font-weight="bold" fill="#E65100">POWER SUPPLY</text>

  <!-- USB 5V -->
  <rect x="30" y="34" width="120" height="52" rx="4"
        fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <text x="90" y="57"  text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">USB 5V</text>
  <text x="90" y="73"  text-anchor="middle" font-size="9"  fill="#666">from connector</text>

  <!-- 5V → 3V3 arrow -->
  <line x1="150" y1="60" x2="212" y2="60"
        stroke="#E65100" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <!-- fork 5V → 1V7 -->
  <polyline points="150,60 178,60 178,83 380,83"
            fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <!-- 3V3 LDO -->
  <rect x="212" y="34" width="120" height="52" rx="4"
        fill="#F0F4F8" stroke="#4A6FA5" stroke-width="1.5"/>
  <text x="272" y="57"  text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">3V3 LDO</text>
  <text x="272" y="73"  text-anchor="middle" font-size="9"  fill="#666">3.3 V digital</text>

  <!-- 1V7 LDO -->
  <rect x="380" y="34" width="120" height="52" rx="4"
        fill="#F0F4F8" stroke="#4A6FA5" stroke-width="1.5"/>
  <text x="440" y="57"  text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">1V7 LDO</text>
  <text x="440" y="73"  text-anchor="middle" font-size="9"  fill="#666">1.7 V — VDDA</text>

  <!-- power annotation downward stubs -->
  <line x1="272" y1="86" x2="272" y2="103"
        stroke="#FFA000" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>
  <text x="272" y="117" text-anchor="middle" font-size="8" fill="#E65100">→ MCU, Mux, USB filter</text>

  <line x1="440" y1="86" x2="440" y2="103"
        stroke="#FFA000" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>
  <text x="440" y="117" text-anchor="middle" font-size="8" fill="#E65100">→ MCU VDDA only</text>

  <!-- ═══════════════════════════════════════════════════════
       USB INTERFACE
  ════════════════════════════════════════════════════════ -->
  <rect x="14" y="128" width="620" height="82" rx="5"
        fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="24" y="144" font-size="10" font-weight="bold" fill="#0D47A1">USB INTERFACE</text>

  <!-- USB-C Connector -->
  <rect x="30" y="150" width="130" height="50" rx="4"
        fill="#F0F4F8" stroke="#4A6FA5" stroke-width="1.5"/>
  <text x="95" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">USB-C</text>
  <text x="95" y="188" text-anchor="middle" font-size="9"  fill="#666">Connector</text>

  <!-- USB-C → EMC arrow -->
  <line x1="160" y1="175" x2="228" y2="175"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="194" y="168" text-anchor="middle" font-size="8" fill="#555">D+/D−</text>

  <!-- USB EMC Filter -->
  <rect x="228" y="150" width="160" height="50" rx="4"
        fill="#F0F4F8" stroke="#4A6FA5" stroke-width="1.5"/>
  <text x="308" y="171" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">EMC Filter</text>
  <text x="308" y="187" text-anchor="middle" font-size="9"  fill="#666">CM choke + ESD clamp</text>

  <!-- USB EMC → STM32 (diagonal) -->
  <line x1="388" y1="175" x2="858" y2="205"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="622" y="178" text-anchor="middle" font-size="9" fill="#333">USB D+/D−</text>

  <!-- ═══════════════════════════════════════════════════════
       ANALOG FRONTEND ×10
  ════════════════════════════════════════════════════════ -->
  <rect x="14" y="248" width="640" height="175" rx="5"
        fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="24" y="265" font-size="10" font-weight="bold" fill="#4A148C">
    ANALOG FRONTEND — ×10 identical channel instances
  </text>

  <!-- Analog input arrow from left -->
  <line x1="0" y1="338" x2="28" y2="338"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="4" y="330" font-size="8" fill="#333">AN IN</text>
  <text x="4" y="341" font-size="8" fill="#333">×10</text>

  <!-- Ch EMC Filter -->
  <rect x="30" y="305" width="135" height="58" rx="4"
        fill="#F0F4F8" stroke="#4A6FA5" stroke-width="1.5"/>
  <text x="97"  y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">EMC Filter</text>
  <text x="97"  y="346" text-anchor="middle" font-size="9"  fill="#666">per channel</text>

  <!-- Ch EMC → LPF -->
  <line x1="165" y1="334" x2="222" y2="334"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Low-Pass Filter -->
  <rect x="222" y="305" width="135" height="58" rx="4"
        fill="#F0F4F8" stroke="#4A6FA5" stroke-width="1.5"/>
  <text x="289" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">Low-Pass</text>
  <text x="289" y="346" text-anchor="middle" font-size="9"  fill="#666">Filter</text>

  <!-- LPF → D2S -->
  <line x1="357" y1="334" x2="414" y2="334"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diff-to-Single Converter -->
  <rect x="414" y="305" width="145" height="58" rx="4"
        fill="#F0F4F8" stroke="#4A6FA5" stroke-width="1.5"/>
  <text x="486" y="327" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">Diff-to-Single</text>
  <text x="486" y="343" text-anchor="middle" font-size="9"  fill="#666">Converter</text>

  <!-- ═══════════════════════════════════════════════════════
       I2C ANALOG MUX
  ════════════════════════════════════════════════════════ -->
  <rect x="672" y="300" width="135" height="68" rx="4"
        fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="739" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">I2C Analog</text>
  <text x="739" y="341" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A1A2E">Mux</text>
  <text x="739" y="357" text-anchor="middle" font-size="9"  fill="#666">10 : 1</text>

  <!-- D2S → Mux -->
  <line x1="559" y1="334" x2="672" y2="334"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="615" y="326" text-anchor="middle" font-size="8" fill="#333">analog ×10</text>

  <!-- Mux → STM32 ADC_IN -->
  <line x1="807" y1="334" x2="858" y2="344"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="834" y="328" text-anchor="middle" font-size="9" fill="#333">ADC_IN</text>

  <!-- I2C control: STM32 → Mux (routed above the frontend group) -->
  <polyline points="858,232 739,232 739,300"
            fill="none" stroke="#555" stroke-width="1.5"
            stroke-dasharray="6,3" marker-end="url(#arr-c)"/>
  <text x="796" y="224" text-anchor="middle" font-size="9" fill="#555">I2C — channel select</text>

  <!-- ═══════════════════════════════════════════════════════
       STM32F7
  ════════════════════════════════════════════════════════ -->
  <rect x="858" y="128" width="212" height="345" rx="6"
        fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="964" y="151" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">STM32F7</text>

  <!-- Section: USB -->
  <line x1="868" y1="162" x2="1060" y2="162" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="964" y="182" text-anchor="middle" font-size="10" fill="#2E7D32">USB FS / HS</text>
  <text x="964" y="197" text-anchor="middle" font-size="9"  fill="#666">full-speed + high-speed</text>

  <!-- Section: I2C -->
  <line x1="868" y1="210" x2="1060" y2="210" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="964" y="232" text-anchor="middle" font-size="10" fill="#2E7D32">I2C Master</text>
  <text x="964" y="247" text-anchor="middle" font-size="9"  fill="#666">controls mux channel</text>

  <!-- Section: ADC -->
  <line x1="868" y1="260" x2="1060" y2="260" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="964" y="295" text-anchor="middle" font-size="10" fill="#2E7D32">ADC — 12-bit</text>
  <text x="964" y="311" text-anchor="middle" font-size="9"  fill="#666">single-ended input</text>
  <text x="964" y="326" text-anchor="middle" font-size="9"  fill="#666">from mux output</text>

  <!-- Section: Power -->
  <line x1="868" y1="340" x2="1060" y2="340" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="964" y="365" text-anchor="middle" font-size="10" fill="#2E7D32">Power</text>
  <text x="964" y="381" text-anchor="middle" font-size="9"  fill="#666">VDD  : 3.3 V</text>
  <text x="964" y="396" text-anchor="middle" font-size="9"  fill="#666">VDDA : 1.7 V (ADC ref)</text>
  <text x="964" y="411" text-anchor="middle" font-size="9"  fill="#666">supplied by on-board LDOs</text>
  <text x="964" y="450" text-anchor="middle" font-size="9"  fill="#aaa">DE202020106111U1</text>

  <!-- ═══════════════════════════════════════════════════════
       LEGEND
  ════════════════════════════════════════════════════════ -->
  <rect x="14" y="448" width="250" height="82" rx="4"
        fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="24" y="466" font-size="10" font-weight="bold" fill="#333">Legend</text>

  <line x1="24" y1="480" x2="70" y2="480"
        stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="80" y="484" font-size="9" fill="#333">Signal / data flow</text>

  <line x1="24" y1="498" x2="70" y2="498"
        stroke="#555" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-c)"/>
  <text x="80" y="502" font-size="9" fill="#333">Control (I2C)</text>

  <line x1="24" y1="516" x2="70" y2="516"
        stroke="#FFA000" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>
  <text x="80" y="520" font-size="9" fill="#333">Power rail</text>

</svg>
