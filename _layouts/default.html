<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Blog" %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- Font Awesome 6 free — self-hosted -->
  <link rel="stylesheet" href="{{ '/assets/fontawesome/all.min.css' | relative_url }}">
  <!-- Fonts — self-hosted, no Google requests -->
  <link rel="stylesheet" href="{{ '/assets/css/fonts.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  {% seo %}
</head>
<body>

  <nav class="nav">
    <a href="{{ '/' | relative_url }}" class="nav-brand">Max<span>Clerkwell</span></a>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}"
         {% if page.url == '/' %}class="active"{% endif %}>Blog</a>
      <a href="{{ '/about/' | relative_url }}"
         {% if page.url contains 'about' %}class="active"{% endif %}>About</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <p>© {{ 'now' | date: '%Y' }} Stephan Bökelmann ·
      <a href="mailto:{{ site.email }}">{{ site.email }}</a> ·
      <a href="{{ '/imprint/' | relative_url }}">Imprint</a>
    </p>
  </footer>

</body>
</html>
