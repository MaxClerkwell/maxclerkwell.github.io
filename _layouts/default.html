<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Blog" %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% if page.math %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  {% endif %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- Font Awesome 6 free — self-hosted -->
  <link rel="stylesheet" href="{{ '/assets/fontawesome/all.min.css' | relative_url }}">
  <!-- Fonts — self-hosted, no Google requests -->
  <link rel="stylesheet" href="{{ '/assets/css/fonts.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  {% seo %}
  {% if page.math %}
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '\\[', right: '\\]', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false}
      ]
    });"></script>
  <style>
    .post-body .katex-display {
      background: var(--bg-2);
      border: 1px solid #1a9fff;
      border-radius: 6px;
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      overflow-x: auto;
    }
  </style>
  {% endif %}
</head>
<body>

  <nav class="nav">
    <a href="{{ '/' | relative_url }}" class="nav-brand">Max<span>Clerkwell</span></a>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}"
         {% if page.url == '/' %}class="active"{% endif %}>Blog</a>
      <a href="{{ '/about/' | relative_url }}"
         {% if page.url contains 'about' %}class="active"{% endif %}>About</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <p>© {{ 'now' | date: '%Y' }} Stephan Bökelmann ·
      <a href="mailto:{{ site.email }}">{{ site.email }}</a> ·
      <a href="{{ '/imprint/' | relative_url }}">Imprint</a>
    </p>
  </footer>

</body>
</html>
